<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PRVEFX Video Editor</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- APP CONTAINER -->

<div class="editor-app">


<!-- TOP BAR -->

<header class="top-bar">

    <div class="logo">
        PRVEFX
    </div>

    <div class="project-name">
        Video Editor
    </div>

    <button class="export-btn">
        Export
    </button>

</header>



<!-- VIDEO PREVIEW -->

<section class="preview-section">


<div class="video-card">


<video id="videoPreview">

</video>


<div class="video-overlay">

    <span id="currentTime">
        00:00
    </span>


    <span>
        /
    </span>


    <span id="endTime">
        00:00
    </span>


</div>


</div>


</section>

  <!-- TIMELINE SECTION -->

<section class="timeline-section">


<div class="timeline-header">

    <span>
        Timeline
    </span>

</div>



<div class="timeline-container">


<input 
type="range"
id="timeline"
value="0"
min="0"
max="100">


<div class="timeline-track">


<div class="video-layer">

</div>


</div>


</div>


</section>




<!-- CONTROL PANEL -->


<section class="controls">


<button id="backwardBtn">
⏮
</button>


<button id="playBtn">
▶
</button>


<button id="pauseBtn">
⏸
</button>


<button id="forwardBtn">
⏭
</button>



<button id="trimStart">
Trim Start
</button>


<button id="trimEnd">
Trim End
</button>


</section> 

  <!-- BOTTOM TOOLBAR -->


<nav class="bottom-toolbar">


<div class="toolbar-scroll">


<button class="tool-btn" data-tool="edit">
Edit
</button>


<button class="tool-btn" data-tool="audio">
Audio
</button>


<button class="tool-btn" data-tool="text">
Text
</button>


<button class="tool-btn" data-tool="effects">
Effects
</button>


<button class="tool-btn" data-tool="filters">
Filters
</button>



</div>



<button class="export-bottom">
Export
</button>


</nav>





<!-- SLIDING TOOL PANEL -->


<div class="tool-panel" id="toolPanel">


<div class="panel-handle"></div>



<button 
class="panel-close"
id="closePanel">

✕

</button>




<div class="tool-category">


<button>
Edit
</button>


<button>
Audio
</button>


<button>
Text
</button>


<button>
Effects
</button>


</div>




<div 
class="tool-content"
id="toolContent">


</div>



</div>





</div>


<script src="script.js"></script>


</body>

</html>
