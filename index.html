<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PRVEFX Video Editor</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<!-- ========================= -->

<!-- TOP BAR -->

<!-- ========================= -->

<header class="top-bar">

<div class="logo">

<h2>PRVEFX</h2>

<p>AI Video Editor</p>

</div>

<div class="top-right">

<button class="icon-button">

⚙

</button>

<button class="export-button">

Export

</button>

</div>

</header>

<!-- ========================= -->

<!-- VIDEO AREA -->

<!-- ========================= -->

<section class="preview-card">

<input
type="file"
id="videoUpload"
accept="video/*">

<video
id="videoPlayer"
controls>

</video>

<p id="currentTime">

0:00

</p>

</section>

<!-- ========================= -->

<!-- TIMELINE -->

<!-- ========================= -->

<section class="timeline-card">

<div class="time-row">

<span id="startTime">
0:00
</span>

<input
type="range"
id="timeline"
value="0"
min="0">

<span id="endTime">
0:00
</span>

</div>

<div class="trim-buttons">

<button onclick="setTrimStart()">

✂ Set Start

</button>

<button onclick="setTrimEnd()">

✂ Set End

</button>

</div>

<p id="trimInfo">

Start: 0:00 | End: 0:00

</p>

</section>

<!-- ========================= -->

<!-- PLAYER CONTROLS -->

<!-- ========================= -->

<section class="controls-card">

<button onclick="backward()">

⏪

</button>

<button onclick="playVideo()">

▶

</button>

<button onclick="pauseVideo()">

⏸

</button>

<button onclick="forward()">

⏩

</button>

</section>

<!-- ========================= -->
<!-- BOTTOM TOOLBAR -->
<!-- ========================= -->

<nav class="bottom-toolbar">

<div class="toolbar-scroll">

<button class="tool active">
<div class="tool-icon">✂</div>
<span>Edit</span>
</button>

<button class="tool">
<div class="tool-icon">🎵</div>
<span>Audio</span>
</button>

<button class="tool">
<div class="tool-icon">📝</div>
<span>Text</span>
</button>

<button class="tool">
<div class="tool-icon">✨</div>
<span>Effects</span>
</button>

<button class="tool">
<div class="tool-icon">🎨</div>
<span>Filters</span>
</button>

<button class="tool">
<div class="tool-icon">⚡</div>
<span>Speed</span>
</button>

<button class="tool">
<div class="tool-icon">📤</div>
<span>Export</span>
</button>

</div>

</nav>

<script src="script.js"></script>

</body>
</html>
