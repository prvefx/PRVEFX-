<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PRVEFX Video Editor</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP BAR -->
<header class="top-bar">

    <div class="logo-box">
        <h2>PRVEFX</h2>
        <p>AI Video Editor</p>
    </div>

    <div class="top-buttons">

        <button class="icon-btn">
            ⚙️
        </button>

        <button class="export-btn">
            Export
        </button>

    </div>

</header>

<!-- VIDEO PREVIEW -->

<section class="preview-section">

<input
type="file"
id="videoUpload"
accept="video/*">

<video
id="videoPlayer"
controls>
</video>

<p id="currentTime">0:00</p>

</section>
<!-- TIMELINE -->

<section class="timeline-section">

    <input
        type="range"
        id="timeline"
        value="0"
        min="0">

    <div class="trim-panel">

        <button onclick="setTrimStart()">
            ✂ Start
        </button>

        <button onclick="setTrimEnd()">
            ✂ End
        </button>

        <p id="trimInfo">
            Start: 0:00 | End: 0:00
        </p>

    </div>

</section>

<!-- BOTTOM TOOLBAR -->

<nav class="bottom-nav">

<div class="tool active">
    <div class="icon">✂</div>
    <span>Edit</span>
</div>

<div class="tool">
    <div class="icon">🎵</div>
    <span>Audio</span>
</div>

<div class="tool">
    <div class="icon">📝</div>
    <span>Text</span>
</div>

<div class="tool">
    <div class="icon">✨</div>
    <span>Effects</span>
</div>

<div class="tool">
    <div class="icon">🎨</div>
    <span>Filters</span>
</div>

<div class="tool">
    <div class="icon">⚡</div>
    <span>Speed</span>
</div>

<div class="tool">
    <div class="icon">📦</div>
    <span>Export</span>
</div>

</nav>
<!-- PLAYBACK CONTROLS -->

<section class="player-controls">

    <button onclick="backward()">
        ⏪
    </button>

    <button onclick="playVideo()">
        ▶
    </button>

    <button onclick="pauseVideo()">
        ⏸
    </button>

    <button onclick="forward()">
        ⏩
    </button>

</section>

<!-- DYNAMIC TOOL PANEL -->

<section class="tool-panel">

    <div id="toolContent">

        <h3>Welcome to PRVEFX Video Editor</h3>

        <p>Select a tool below to start editing your video.</p>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
